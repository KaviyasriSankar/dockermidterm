<!DOCTYPE html>
<html>
<head>

        .title { color: #007bff; font-weight: bold; margin-bottom: 20px; }
        h3 { border-bottom: 1px solid #ddd; padding-bottom: 5px; margin-top: 20px; }
        ul { padding-left: 20px; color: #555; }
        li { margin-bottom: 5px; }
        .contact { font-size: 0.9em; color: #666; }

</head>

    </div>

    <h3>Summary</h3>

    <h3>Skills</h3>

        <li>HTML, CSS, JavaScript</li>
        <li>Graphic Design</li>
        <li>Problem Solving</li>
    </ul>

    <h3>Education</h3>

</html>
